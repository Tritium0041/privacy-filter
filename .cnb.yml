# ---- Shared config ----
.build-stages: &build-stages
  - name: set docker tag
    script: |
      if [ "$CNB_IS_TAG" = "true" ]; then
        TAG="$CNB_BRANCH"
        VERSION="$CNB_BRANCH"
      else
        TAG="dev"
        VERSION="$(git rev-parse --short HEAD)"
      fi
      BASE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
      echo "##[set-output image=${BASE}:${TAG}-${CNB_BRANCH}-${ARCH}]"
      echo "##[set-output version=${VERSION}]"
    exports:
      image: IMAGE_TAG
      version: VERSION

  - name: docker build and push
    script: |
      docker buildx build \
        --platform linux/${ARCH} \
        --build-arg VERSION=${VERSION} \
        -t ${IMAGE_TAG} --push .

  - name: resolve
    type: cnb:resolve
    options:
      key: build-${ARCH}

.manifest-stages: &manifest-stages
  - name: await build-amd64
    type: cnb:await
    options:
      key: build-amd64
  - name: await build-arm64
    type: cnb:await
    options:
      key: build-arm64

  - name: set manifest tag
    script: |
      if [ "$CNB_IS_TAG" = "true" ]; then
        TAG="$CNB_BRANCH"
      else
        TAG="dev"
      fi
      BASE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
      echo "##[set-output image=${BASE}:${TAG}]"
      echo "##[set-output tag=${TAG}]"
    exports:
      image: IMAGE_TAG
      tag: TAG

  - name: create manifest
    script: |
      docker buildx imagetools create -t ${IMAGE_TAG} \
        ${IMAGE_TAG}-${CNB_BRANCH}-amd64 \
        ${IMAGE_TAG}-${CNB_BRANCH}-arm64

  - name: cleanup arch tags
    type: artifact:remove-tag
    options:
      name: ${CNB_REPO_NAME_LOWERCASE}
      tags:
        - ${TAG}-${CNB_BRANCH}-amd64
        - ${TAG}-${CNB_BRANCH}-arm64

# ---- Shared pipeline definitions ----
.pipeline-amd64: &pipeline-amd64
  name: build-amd64
  env:
    ARCH: amd64
  runner:
    tags: cnb:arch:amd64
  services:
    - docker
  lock:
    killPrevious: true
  stages: *build-stages

.pipeline-arm64: &pipeline-arm64
  name: build-arm64
  env:
    ARCH: arm64
  runner:
    tags: cnb:arch:arm64:v8
  services:
    - docker
  lock:
    killPrevious: true
  stages: *build-stages

.pipeline-manifest: &pipeline-manifest
  name: create-manifest
  runner:
    tags: cnb:arch:amd64
    cpus: 1
  services:
    - docker
  lock:
    killPrevious: true
  stages: *manifest-stages

# ---- dev branch: triggered on push ----
dev:
  push:
    - *pipeline-amd64
    - *pipeline-arm64
    - *pipeline-manifest

# ---- Tags: triggered on tag push ----
"v*":
  tag_push:
    - *pipeline-amd64
    - *pipeline-arm64
    - *pipeline-manifest
